services:
  purgarr:
    image: ghcr.io/steveharsant/purgarr:latest
    container_name: purgarr
    ports:
      - 9891:9891
    environment:
      - LOG_OUTPUT=web
      - QBIT_URL=${QBIT_URL}
      - QBIT_PASSWORD=${QBIT_PASSWORD}
      - QBIT_TOKEN_REFRESH_INTERVAL=${QBIT_TOKEN_REFRESH_INTERVAL}
      - SONARR_API_KEY=${SONARR_API_KEY}
      - SONARR_URL=${SONARR_URL}
      - RADARR_API_KEY=${RADARR_API_KEY}
      - RADARR_URL=${RADARR_URL}
    restart: unless-stopped

  boxarr:
    image: ghcr.io/iongpt/boxarr:latest
    container_name: boxarr
    ports:
      - 8888:8888
    volumes:
      - ${DOCKER_PATH}/boxarr:/config
    restart: unless-stopped
    environment:
      - TZ=${TIMEZONE}

  sortarr:
    image: ghcr.io/jaredharper1/sortarr:latest
    container_name: sortarr
    ports:
      - "9595:8787"
    environment:
      - SORTARR_CONFIG_PATH=/data/Sortarr.env
      - ENV_FILE_PATH=/data/Sortarr.env
      - CACHE_SECONDS=300
      - SORTARR_STORE_SECRETS_AS_FILES=1
      - SORTARR_ALLOW_PLAINTEXT_SECRETS=0
      - SORTARR_ALLOW_UNSAFE_EPHEMERAL_RECOVERY=0
    volumes:
      - ${DOCKER_PATH}/sortarr:/data
      - ${FILE_PATH}/media:/media
      - ${DOCKER_PATH}/sortarr:/data/.env:/app/.env
    restart: unless-stopped

  subtractor:
    image: subtractor:latest
    container_name: subtractor
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SUBTRACTOR_USERNAME: ${SUBTRACTOR_USERNAME:-admin}
      SUBTRACTOR_PASSWORD: ${SUBTRACTOR_PASSWORD}
      SUBTRACTOR_RETENTION_DAYS: "14"     # days uploads are kept before auto-delete
      SUBTRACTOR_MAX_UPLOAD_MB: "8192"    # max upload size in MiB
      SUBTRACTOR_SECURE_COOKIES: "true"  # set "true" when behind an HTTPS reverse proxy
      SUBTRACTOR_LISTEN: ":8080"
      SUBTRACTOR_DATA_DIR: /data
    # volumes:
    #   - ${DOCKER_PATH}/subtractor:/data
    # Hardening
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1g

